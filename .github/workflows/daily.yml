name: AIA 뉴스클리핑 자동 생성

on:
  schedule:
    - cron: '0 22 * * *'    # 매일 07:00 KST (= 전날 22:00 UTC)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 의존성 설치
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: newsletters 폴더 확인
        run: mkdir -p newsletters

      - name: 뉴스레터 생성 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/generate.js
          echo "--- 생성된 파일 목록 ---"
          ls -la newsletters/

      - name: Git 커밋 & 푸시
        run: |
          git config user.name  "AIA Newsletter Bot"
          git config user.email "bot@aia-newsletter.local"
          git add -A newsletters/
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "📰 $(date +'%Y-%m-%d') 뉴스클리핑 자동 생성"
            git push
            echo "✅ 푸시 완료"
          fi
